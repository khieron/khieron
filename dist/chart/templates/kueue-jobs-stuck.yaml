apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "chart.fullname" . }}-kueue-jobs-stuck
  labels:
  {{- include "chart.labels" . | nindent 4 }}
data:
  kueue-jobs-stuck___SKILL.md: {{ .Values.kueueJobsStuck.kueueJobsStuckSKILLMd |
    toYaml | indent 1 }}
  kueue-jobs-stuck___assets___kueue-advisory-jobs-stuck.json: {{ .Values.kueueJobsStuck.kueueJobsStuckAssetsKueueAdvisoryJobsStuckJson
    | toYaml | indent 1 }}
  kueue-jobs-stuck___assets___kueue-advisory-tool-failed.json: {{ .Values.kueueJobsStuck.kueueJobsStuckAssetsKueueAdvisoryToolFailedJson
    | toYaml | indent 1 }}
  kueue-jobs-stuck___scripts___get-jobs-stuck.sh: {{ .Values.kueueJobsStuck.kueueJobsStuckScriptsGetJobsStuckSh
    | toYaml | indent 1 }}
---
apiVersion: agency.khieron.io/v1alpha1
kind: Skill
metadata:
  name: {{ include "chart.fullname" . }}-kueue-jobs-stuck
  labels:
  {{- include "chart.labels" . | nindent 4 }}
