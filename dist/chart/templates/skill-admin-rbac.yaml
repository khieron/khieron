apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "chart.fullname" . }}-skill-admin-role
  labels:
    rbac.authorization.k8s.io/aggregate-to-admin: "true"
  {{- include "chart.labels" . | nindent 4 }}
rules:
- apiGroups:
  - agency.khieron.io
  resources:
  - skills
  verbs:
  - '*'
- apiGroups:
  - agency.khieron.io
  resources:
  - skills/status
  verbs:
  - get
