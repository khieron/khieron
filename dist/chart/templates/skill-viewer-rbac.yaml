apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "chart.fullname" . }}-skill-viewer-role
  labels:
  {{- include "chart.labels" . | nindent 4 }}
rules:
- apiGroups:
  - agency.khieron.io
  resources:
  - skills
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - agency.khieron.io
  resources:
  - skills/status
  verbs:
  - get
