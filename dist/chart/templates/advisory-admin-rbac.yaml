apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "chart.fullname" . }}-advisory-admin-role
  labels:
  {{- include "chart.labels" . | nindent 4 }}
rules:
- apiGroups:
  - agency.khieron.io
  resources:
  - advisories
  verbs:
  - '*'
- apiGroups:
  - agency.khieron.io
  resources:
  - advisories/status
  verbs:
  - get
