apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "chart.fullname" . }}-skill-editor-role
  labels:
    rbac.authorization.k8s.io/aggregate-to-edit: "true"
  {{- include "chart.labels" . | nindent 4 }}
rules:
- apiGroups:
  - agency.khieron.io
  resources:
  - skills
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - agency.khieron.io
  resources:
  - skills/status
  verbs:
  - get
