controllerManager:
  manager:
    args:
    - --metrics-bind-address=:8443
    - --leader-elect
    - --health-probe-bind-address=:8081
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
    image:
      repository: example.com/khieron
      tag: v0.0.1
    resources:
      limits:
        cpu: 500m
        memory: 128Mi
      requests:
        cpu: 10m
        memory: 64Mi
  nodeSelector: {}
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  replicas: 1
  tolerations: []
  topologySpreadConstraints: []
kubernetesClusterDomain: cluster.local
kueueIdleAllocatedGpus:
  kueueIdleAllocatedGpusAssetsKueueAdvisoryIdleGpuJson: |-
    {
        "name": "idle-gpu",
        "advisory": "GPU allocated to pod {pod name} in namespace {namespace} is showing low utilization ({utilization}%)",
        "explaination": "{explaination}",
        "proposal": "{proposal}"
    }
  kueueIdleAllocatedGpusAssetsKueueAdvisoryToolFailedJson: |-
    {
        "name": "tool-failed",
        "advisory": "The Kueue skill {skill name} failed",
        "explaination": "{explaination}",
        "proposal": "Suspend the KueueSkill agent until the problem is fixed"
    }
  kueueIdleAllocatedGpusSKILLMd: |-
    ---
    name: kueue-idle-allocated-gpus
    description: Looks out for GPU that have been allocated to Kueue workloads, but showing low or no GPU utilization.
    license: Apache-2.0
    metadata:
      author: Sean Condon
      version: "0.1.0"
    compatibility: Used by khieron operator. Requires Kueue operator on a Kubernetes cluster.
    ---
    # Kueue Idle Allocated GPU detector
    You are an autonomous SRE skill. You MUST execute all steps below using the available tools. Do NOT ask for confirmation, environment details, or user input. All required information is available through the provided scripts. If a script fails, report the error and move to the next step.
    ## Step 1: Load GPU Utilization data
    Use the run_script tool to execute `scripts/get-dcgm-metrics.sh`. This script retrieves DCGM_FI_DEV_GPU_UTIL metrics for all pods with GPU allocations and filters for utilization below 20%. Parse the JSON response to identify pods and their GPU utilization values. If the script returns an empty array, report that no idle GPUs were found and stop.
    ## Step 2: Load workload details
    For each of the pods identified in Step 1, use the run_script tool to execute `scripts/get-workload-by-pod.sh <namespace> <pod_name>` (using the `exported_namespace` and `exported_pod` values from the metrics). This script retrieves the owning Job and Kueue Workload details for the pod. Parse the JSON response to get the job status and workload conditions.
    ## Step 3: Check the conditions of the workload
    Check the age of the workload and if more than 1 minute old investiagte further. Check the corresponding Job to see if it is started or waiting on something. Check messages and use your intelligence to fixure out if this job will start soon. Look at its logs to see if there are any errors.
    ## Step 4: Raise an Advisory
    If you identify an issue that is not temporary and will not fix itself, raise an Advisory.
    Use the load_skill_resource tool to load the appropriate advisory template from `assets/`:
    - `assets/kueue-advisory-tool-failed.json` -- when a script or tool execution fails
    - `assets/kueue-advisory-idle-gpu.json` -- when an idle GPU workload is found
    Fill in the template's placeholder fields (e.g. `{skill name}`, `{pod name}`, `{namespace}`, `{utilization}`, `{explaination}`, `{proposal}`) with specific details about the issue you discovered. The proposal field should describe a concrete action to resolve the issue (e.g. "Set spec.enableagent to false on the owning Skill to suspend the agent"). Then use the create_advisory tool with the filled-in name, advisory, explaination, and proposal fields to create the Advisory CR.
    ## Step 5: Repeat for other workloads.
    Steps 2-5 should be repeated for each workload.
    ## Error Handling
    If any script in Steps 1-3 fails, load the `assets/kueue-advisory-tool-failed.json` template using load_skill_resource, fill in the details of the failure, and use the create_advisory tool to raise an advisory. Do not stop execution -- continue with remaining steps if possible.
    ## Prerequisites
    - The metrics API URL is available via the run_script tool by executing `scripts/get-metrics-api.sh`.
    - All scripts must be executed using the run_script tool. Do not attempt to access the filesystem or environment variables directly.
    - Advisory templates are in the `assets/` directory and must be loaded using the load_skill_resource tool.
    - Advisories must be created using the create_advisory tool with name, advisory, explaination, and proposal fields.
    - When an advisory proposal is approved by a human, you may be invoked to execute it. Use the update_owner tool to modify the owning Skill (e.g. set enableagent to false to suspend the agent).
  kueueIdleAllocatedGpusScriptsGetDcgmMetricsSh: |-
    #!/bin/bash
    set -ex
    if [ -z "${METRICS_API_SERVER}" ]; then
      echo "METRICS_API_SERVER is not set"
      exit -1
    fi
    TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
    CACERT="--cacert /var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
    QUERY='query=DCGM_FI_DEV_GPU_UTIL{exported_pod!=""}'
    RESPONSE=$(curl -sS -k -f ${CACERT} -H "Authorization: Bearer ${TOKEN}" -H "Accept: application/json" --data-urlencode "${QUERY}" "${METRICS_API_SERVER}/api/v1/query")
    if [ $? -ne 0 ]; then
      echo "Failed to query metrics: ${RESPONSE}"
      exit -1
    fi
    echo "${RESPONSE}" | jq '[.data.result[] | select((.value[1] | tonumber) < 20) | {
      modelName: .metric.modelName,
      gpu: .metric.gpu,
      exported_pod: .metric.exported_pod,
      exported_namespace: .metric.exported_namespace,
      exported_container: .metric.exported_container,
      device: .metric.device,
      Hostname: .metric.Hostname,
      UUID: .metric.UUID,
      utilization: (.value[1] | tonumber)
    }]'
    exit 0
  kueueIdleAllocatedGpusScriptsGetMetricsApiSh: |-
    #!/bin/bash
    if [ -z "${METRICS_API_SERVER}" ]; then
      echo "METRICS_API_SERVER is not set"
      exit -1
    fi
    echo "${METRICS_API_SERVER}"
    exit 0
  kueueIdleAllocatedGpusScriptsGetWorkloadByPodSh: |-
    #!/bin/bash
    # Usage: get-workload-by-pod.sh <namespace> <pod_name>
    NAMESPACE=$1
    POD_NAME=$2
    if [ -z "$NAMESPACE" ] || [ -z "$POD_NAME" ]; then
      echo "Usage: get-workload-by-pod.sh <namespace> <pod_name>"
      exit -1
    fi
    TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
    CA=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    API="https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT}"
    # Step 1: Get the Job name from the pod's owner reference
    JOB_NAME=$(curl -ks --cacert $CA -H "Authorization: Bearer $TOKEN" \
      -H "Accept: application/json" \
      "$API/api/v1/namespaces/$NAMESPACE/pods/$POD_NAME" | \
      jq -r '.metadata.ownerReferences[] | select(.kind=="Job") | .name')
    if [ -z "$JOB_NAME" ]; then
      echo "No Job owner found for pod $POD_NAME"
      exit -1
    fi
    # Step 2: Get the Job details (name, creationTimestamp, spec, status only)
    JOB=$(curl -ks --cacert $CA -H "Authorization: Bearer $TOKEN" \
      -H "Accept: application/json" \
      "$API/apis/batch/v1/namespaces/$NAMESPACE/jobs/$JOB_NAME" | \
      jq '{name: .metadata.name, createdAt: .metadata.creationTimestamp, spec: .spec, status: .status}')
    # Step 3: Get the Kueue Workload for this Job (name, creationTimestamp, spec, status only)
    WORKLOAD=$(curl -ks --cacert $CA -H "Authorization: Bearer $TOKEN" \
      -H "Accept: application/json" \
      "$API/apis/kueue.x-k8s.io/v1beta2/namespaces/$NAMESPACE/workloads" | \
      jq --arg job "$JOB_NAME" '[.items[] | select(.metadata.ownerReferences[]?.name == $job) | {name: .metadata.name, createdAt: .metadata.creationTimestamp, spec: .spec, status: .status}]')
    echo "{\"pod\": \"$POD_NAME\", \"namespace\": \"$NAMESPACE\", \"job_name\": \"$JOB_NAME\", \"job\": $JOB, \"workloads\": $WORKLOAD}" | jq .
    exit 0
kueueJobsStuck:
  kueueJobsStuckAssetsKueueAdvisoryJobsStuckJson: |-
    {
        "name": "job-stuck",
        "advisory": "Job {job} in namepsace {namespace} has been admitted by the Kueue controller but is stuck",
        "explaination": "{explaination}",
        "proposal": "Terminate the job {job} in namespace {namespace}"
    }
  kueueJobsStuckAssetsKueueAdvisoryToolFailedJson: |-
    {
        "name": "tool-failed",
        "advisory": "The Skill {skill name} failed",
        "explaination": "{explaination}",
        "proposal": "Suspend the Skill agent until the problem is fixed"
    }
  kueueJobsStuckSKILLMd: |-
    ---
    name: kueue-jobs-stuck
    description: Looks out for jobs that have been admissted by Kueue but can't run for some reason.
    license: Apache-2.0
    metadata:
      author: Sean Condon
      version: "0.1.0"
    compatibility: Used by khieron operator. Requires Kueue operator on a Kubernetes cluster.
    ---
    # Kueue Idle Allocated GPU detector
    You are an autonomous SRE skill. You MUST execute all steps below using the available tools. Do NOT ask for confirmation, environment details, or user input. All required information is available through the provided scripts. If a script fails, report the error and move to the next step.
    ## Step 1: List pods in kueue enabled namespaces and see if any are not running
    Use the run_script tool to execute `scripts/get-jobs-stuck.sh`. This script retrieves a
    list of pods that have been admitted by the Kueue controller, but yet cannot run for a variety
    of reasons.
    ## Step 2: Raise an Advisory
    For each of these stuck pods that is not temporary and will not fix itself, raise an Advisory.
    Use the load_skill_resource tool to load the appropriate advisory template from `assets/`:
    - `assets/kueue-advisory-tool-failed.json` -- when a script or tool execution fails
    - `assets/kueue-advisory-jobs-stuck.json` -- when an a stuck job is found
    Fill in the template's placeholder fields (e.g. `{skill name}`, `{pod name}`, `{namespace}`, `{utilization}`, `{explaination}`, `{proposal}`) with specific details about the issue you discovered. The proposal field should describe a concrete action to resolve the issue (e.g. "Set spec.enableagent to false on the owning Skill to suspend the agent"). Then use the create_advisory tool with the filled-in name, advisory, explaination, and proposal fields to create the Advisory CR.
    ## Step 3: Label the Advisory with the related Job
    After creating each advisory, use the set_advisory_labels tool to label the Advisory with the related Job's name and namespace. Pass the advisory name (returned by create_advisory), and the job name and namespace from the stuck pod data. This allows the controller to track which Job an advisory relates to, and clean up the advisory when the Job is deleted.
    ## Step 4: Repeat for other pods.
    Steps 2-3 should be repeated for each stuck pod.
    ## Error Handling
    If any script in Steps 1-4 fails, load the `assets/kueue-advisory-tool-failed.json` template using load_skill_resource, fill in the details of the failure, and use the create_advisory tool to raise an advisory. Do not stop execution -- continue with remaining steps if possible.
    ## Prerequisites
    - All scripts must be executed using the run_script tool. Do not attempt to access the filesystem or environment variables directly.
    - Advisory templates are in the `assets/` directory and must be loaded using the load_skill_resource tool.
    - Advisories must be created using the create_advisory tool with name, advisory, explaination, and proposal fields.
    - After creating an advisory, use the set_advisory_labels tool to label it with the related Job's name and namespace.
    - When an advisory proposal is approved by a human, you may be invoked to execute it. Use the update_owner tool to modify the owning Skill (e.g. set enableagent to false to suspend the agent).
  kueueJobsStuckScriptsGetJobsStuckSh: |-
    #!/bin/bash
    set -ex
    TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
    CACERT="--cacert /var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
    API="https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT}"
    # Get namespaces labelled with kueue.openshift.io/managed=true
    NAMESPACES=$(curl -sS -k -f ${CACERT} \
      -H "Authorization: Bearer ${TOKEN}" \
      -H "Accept: application/json" \
      -G --data-urlencode 'labelSelector=kueue.openshift.io/managed=true' \
      "${API}/api/v1/namespaces")
    if [ $? -ne 0 ]; then
      echo "Failed to query namespaces: ${NAMESPACES}"
      exit -1
    fi
    NS_LIST=$(echo "${NAMESPACES}" | jq -r '.items[].metadata.name')
    if [ -z "${NS_LIST}" ]; then
      echo "[]"
      exit 0
    fi
    # Collect non-running pods from each managed namespace
    RESULTS="[]"
    for NS in ${NS_LIST}; do
      PODS=$(curl -sS -k -f ${CACERT} \
        -H "Authorization: Bearer ${TOKEN}" \
        -H "Accept: application/json" \
        "${API}/api/v1/namespaces/${NS}/pods?fieldSelector=status.phase%21%3DRunning%2Cstatus.phase%21%3DSucceeded")
      if [ $? -ne 0 ]; then
        echo "Failed to query pods in namespace ${NS}: ${PODS}"
        continue
      fi
      NS_RESULTS=$(echo "${PODS}" | jq '[.items[] | {
        name: .metadata.name,
        namespace: .metadata.namespace,
        job: ([.metadata.ownerReferences[]? | select(.kind == "Job") | .name][0] // ""),
        workload: (.metadata.annotations["kueue.x-k8s.io/workload"] // ""),
        phase: .status.phase,
        reason: (.status.reason // ""),
        message: (.status.message // ""),
        conditions: [.status.conditions[]? | {type: .type, status: .status, reason: (.reason // ""), message: (.message // "")}],
        createdAt: .metadata.creationTimestamp
      }]')
      RESULTS=$(echo "${RESULTS}" "${NS_RESULTS}" | jq -s '.[0] + .[1]')
    done
    echo "${RESULTS}"
    exit 0
metricsService:
  ports:
  - name: https
    port: 8443
    protocol: TCP
    targetPort: 8443
  type: ClusterIP
serviceAccount:
  annotations: {}
  automount: true
  create: true
  name: ""
