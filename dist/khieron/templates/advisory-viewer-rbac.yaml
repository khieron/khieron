apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "khieron.fullname" . }}-advisory-viewer-role
  labels:
    rbac.authorization.k8s.io/aggregate-to-view: "true"
  {{- include "khieron.labels" . | nindent 4 }}
rules:
- apiGroups:
  - agency.khieron.io
  resources:
  - advisories
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - agency.khieron.io
  resources:
  - advisories/status
  verbs:
  - get
