{{- if .Values.googleServiceAccountKey.keyJson }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "khieron.fullname" . }}-google-service-account-key
  labels:
  {{- include "khieron.labels" . | nindent 4 }}
data:
  key.json: {{ .Values.googleServiceAccountKey.keyJson | b64enc | quote }}
type: Opaque
{{- end }}