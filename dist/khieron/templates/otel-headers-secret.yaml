{{- if and .Values.otelHeadersSecret .Values.otelHeadersSecret.otelExporterOtlpHeaders }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "khieron.fullname" . }}-otel-headers-secret
  labels:
  {{- include "khieron.labels" . | nindent 4 }}
data:
  OTEL_EXPORTER_OTLP_HEADERS: {{ .Values.otelHeadersSecret.otelExporterOtlpHeaders | b64enc | quote }}
type: Opaque
{{- end }}
