  name: {{ include "khieron.fullname" . }}-otel-headers-secret
  labels:
  {{- include "khieron.labels" . | nindent 4 }}
data:
  OTEL_EXPORTER_OTLP_HEADERS: {{ required "otelHeadersSecret.otelExporterOtlpHeaders is required" .Values.otelHeadersSecret.otelExporterOtlpHeaders | b64enc | quote
    }}
type: Opaque
