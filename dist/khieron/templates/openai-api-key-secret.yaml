{{- if .Values.openaiApiKeySecret.openaiApiKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "khieron.fullname" . }}-openai-api-key-secret
  labels:
  {{- include "khieron.labels" . | nindent 4 }}
data:
  OPENAI_API_KEY: {{ .Values.openaiApiKeySecret.openaiApiKey | b64enc | quote }}
type: Opaque
{{- end }}
