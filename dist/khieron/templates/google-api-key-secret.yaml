apiVersion: v1
kind: Secret
metadata:
  name: {{ include "khieron.fullname" . }}-google-api-key-secret
  labels:
  {{- include "khieron.labels" . | nindent 4 }}
data:
  GOOGLE_API_KEY: {{ required "googleApiKeySecret.googleApiKey is required" .Values.googleApiKeySecret.googleApiKey
    | b64enc | quote }}
type: Opaque
