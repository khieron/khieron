{{- if not (or .Values.googleApiKeySecret.googleApiKey .Values.googleApiKeySecret.googleCloudProject) }}
{{- fail "Either googleApiKeySecret.googleApiKey or googleApiKeySecret.googleCloudProject must be provided" }}
{{- end }}
{{- if and .Values.googleApiKeySecret.googleApiKey .Values.googleApiKeySecret.googleCloudProject }}
{{- fail "Only one of googleApiKeySecret.googleApiKey or googleApiKeySecret.googleCloudProject can be provided, not both" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "khieron.fullname" . }}-google-api-key-secret
  labels:
  {{- include "khieron.labels" . | nindent 4 }}
data:
  {{- if .Values.googleApiKeySecret.googleApiKey }}
  GOOGLE_API_KEY: {{ required "googleApiKeySecret.googleApiKey is required" .Values.googleApiKeySecret.googleApiKey
    | b64enc | quote }}
  {{- end }}
  {{- if .Values.googleApiKeySecret.googleCloudProject }}
  GOOGLE_CLOUD_LOCATION: {{ .Values.googleApiKeySecret.googleCloudLocation | default "global" | b64enc | quote }}
  {{- end }}
  {{- if .Values.googleApiKeySecret.googleCloudProject }}
  GOOGLE_CLOUD_PROJECT: {{ required "googleApiKeySecret.googleCloudProject is required"
    .Values.googleApiKeySecret.googleCloudProject | b64enc | quote }}
  {{- end }}
type: Opaque
