apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "khieron.fullname" . }}-controller-manager
  labels:
    control-plane: controller-manager
  {{- include "khieron.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.controllerManager.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: khieron
      control-plane: controller-manager
    {{- include "khieron.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: khieron
        control-plane: controller-manager
      {{- include "khieron.selectorLabels" . | nindent 8 }}
      annotations:
        kubectl.kubernetes.io/default-container: manager
    spec:
      containers:
      - args: {{- toYaml .Values.controllerManager.manager.args | nindent 8 }}
        command:
        - /manager
        env:
        - name: GOOGLE_API_KEY
          valueFrom:
            secretKeyRef:
              key: GOOGLE_API_KEY
              name: {{ include "khieron.fullname" . }}-google-api-key-secret
              optional: true
        - name: GOOGLE_CLOUD_PROJECT
          valueFrom:
            secretKeyRef:
              key: GOOGLE_CLOUD_PROJECT
              name: {{ include "khieron.fullname" . }}-google-api-key-secret
              optional: true
        - name: GOOGLE_CLOUD_LOCATION
          valueFrom:
            secretKeyRef:
              key: GOOGLE_CLOUD_LOCATION
              name: {{ include "khieron.fullname" . }}-google-api-key-secret
              optional: true
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: {{ quote .Values.controllerManager.manager.env.googleApplicationCredentials
            }}
        - name: KUBERNETES_CLUSTER_DOMAIN
          value: {{ quote .Values.kubernetesClusterDomain }}
        image: {{ .Values.controllerManager.manager.image.repository }}:{{ .Values.controllerManager.manager.image.tag
          | default .Chart.AppVersion }}
        imagePullPolicy: {{ .Values.controllerManager.manager.imagePullPolicy }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources: {{- toYaml .Values.controllerManager.manager.resources | nindent 10
          }}
        securityContext: {{- toYaml .Values.controllerManager.manager.containerSecurityContext
          | nindent 10 }}
        volumeMounts:
        - mountPath: /etc/khieron
          name: agent-instruction
          readOnly: true
        - mountPath: /var/secrets/google
          name: google-service-account-key
          readOnly: true
      nodeSelector: {{- toYaml .Values.controllerManager.nodeSelector | nindent 8 }}
      securityContext: {{- toYaml .Values.controllerManager.podSecurityContext | nindent
        8 }}
      serviceAccountName: {{ include "khieron.serviceAccountName" . }}
      terminationGracePeriodSeconds: 10
      tolerations: {{- toYaml .Values.controllerManager.tolerations | nindent 8 }}
      topologySpreadConstraints: {{- toYaml .Values.controllerManager.topologySpreadConstraints
        | nindent 8 }}
      volumes:
      - configMap:
          name: {{ include "khieron.fullname" . }}-agent-instruction
        name: agent-instruction
      - name: google-service-account-key
        secret:
          optional: true
          secretName: {{ include "khieron.fullname" . }}-google-service-account-key
