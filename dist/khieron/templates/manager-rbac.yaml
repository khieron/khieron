apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "khieron.fullname" . }}-manager-role
  labels:
  {{- include "khieron.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - namespaces
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - agency.khieron.io
  resources:
  - advisories
  - skills
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - agency.khieron.io
  resources:
  - advisories/finalizers
  - skills/finalizers
  verbs:
  - update
- apiGroups:
  - agency.khieron.io
  resources:
  - advisories/status
  - skills/status
  verbs:
  - get
  - patch
  - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "khieron.fullname" . }}-manager-rolebinding
  labels:
  {{- include "khieron.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: '{{ include "khieron.fullname" . }}-manager-role'
subjects:
- kind: ServiceAccount
  name: '{{ include "khieron.serviceAccountName" . }}'
  namespace: '{{ .Release.Namespace }}'
