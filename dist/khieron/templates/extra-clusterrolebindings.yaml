{{- range .Values.extraClusterRoleBindings }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "khieron.fullname" $ }}-{{ . }}
  labels:
  {{- include "khieron.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ . }}
subjects:
- kind: ServiceAccount
  name: '{{ include "khieron.serviceAccountName" $ }}'
  namespace: '{{ $.Release.Namespace }}'
{{- end }}
