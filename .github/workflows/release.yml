name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: make test

  build-and-push:
    name: Build & Push Container Image
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: VERSION=${{ steps.version.outputs.VERSION }}
          tags: |
            ghcr.io/khieron/khieron:${{ steps.version.outputs.VERSION }}
            ghcr.io/khieron/khieron:latest

  helm-release:
    name: Package & Push Helm Chart
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "TAG=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Generate Helm chart
        run: make helm-chart

      - name: Stamp chart version
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.VERSION }}/" dist/khieron/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.TAG }}\"/" dist/khieron/Chart.yaml
          sed -i "s|repository:.*|repository: ghcr.io/khieron/khieron|" dist/khieron/values.yaml
          sed -i "s|tag:.*|tag: \"${{ steps.version.outputs.TAG }}\"|" dist/khieron/values.yaml

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package and push Helm chart
        run: |
          helm package dist/khieron --destination /tmp/helm-pkg
          helm push /tmp/helm-pkg/khieron-${{ steps.version.outputs.VERSION }}.tgz oci://ghcr.io/khieron/charts

  github-release:
    name: Create GitHub Release
    needs: [build-and-push, helm-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            {
              echo "CHANGELOG<<EOF"
              git log --pretty=format:"- %s (%h)"
              echo ""
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "CHANGELOG<<EOF"
              git log --pretty=format:"- %s (%h)" "${PREV_TAG}..${GITHUB_REF_NAME}"
              echo ""
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            ## Container Image

            ```
            docker pull ghcr.io/khieron/khieron:${{ github.ref_name }}
            ```

            ## Helm Chart

            ```
            helm install khieron oci://ghcr.io/khieron/charts/khieron --version ${GITHUB_REF_NAME#v}
            ```

            ## Changes

            ${{ steps.changelog.outputs.CHANGELOG }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
