name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0)'
        required: true

permissions:
  contents: write
  packages: write

env:
  RELEASE_VERSION: ${{ inputs.version || github.ref_name }}

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: make test

  build-and-push:
    name: Build & Push Container Image
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: VERSION=${{ env.RELEASE_VERSION }}
          tags: |
            ghcr.io/khieron/khieron:${{ env.RELEASE_VERSION }}
            ghcr.io/khieron/khieron:latest
          labels: |
            org.opencontainers.image.title=khieron
            org.opencontainers.image.description=Lightweight Kubernetes-native agentic operator
            org.opencontainers.image.version=${{ env.RELEASE_VERSION }}
            org.opencontainers.image.source=https://github.com/khieron/khieron
            org.opencontainers.image.url=https://github.com/khieron/khieron
            org.opencontainers.image.vendor=Khieron
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.authors=scondon@redhat.com
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}

  helm-release:
    name: Package & Push Helm Chart
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Helm chart version
        id: version
        run: |
          TAG="${RELEASE_VERSION}"
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "TAG=$TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Generate Helm chart
        run: |
          printf 'GOOGLE_API_KEY=\nGOOGLE_CLOUD_PROJECT=\nGOOGLE_CLOUD_LOCATION=global\n' > config/default/google-api-key.env
          echo OPENAI_API_KEY= > config/default/openai-api-key.env
          echo OTEL_EXPORTER_OTLP_HEADERS= > config/default/otel-headers.env
          make helm-chart

      - name: Stamp chart version
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.VERSION }}/" dist/khieron/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.TAG }}\"/" dist/khieron/Chart.yaml
          sed -i "s|repository:.*|repository: ghcr.io/khieron/khieron|" dist/khieron/values.yaml
          sed -i "s|tag:.*|tag: \"${{ steps.version.outputs.TAG }}\"|" dist/khieron/values.yaml

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package and push Helm chart
        run: |
          helm package dist/khieron --destination /tmp/helm-pkg
          helm push /tmp/helm-pkg/khieron-${{ steps.version.outputs.VERSION }}.tgz oci://ghcr.io/khieron/charts

  github-release:
    name: Create GitHub Release
    needs: [build-and-push, helm-release]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            {
              echo "CHANGELOG<<EOF"
              git log --pretty=format:"- %s (%h)"
              echo ""
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "CHANGELOG<<EOF"
              git log --pretty=format:"- %s (%h)" "${PREV_TAG}..${GITHUB_REF_NAME}"
              echo ""
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          name: ${{ env.RELEASE_VERSION }}
          body: |
            ## Container Image

            ```
            docker pull ghcr.io/khieron/khieron:${{ env.RELEASE_VERSION }}
            ```

            ## Helm Chart

            ```
            helm install khieron oci://ghcr.io/khieron/charts/khieron --version ${{ env.RELEASE_VERSION }}
            ```

            ## Changes

            ${{ steps.changelog.outputs.CHANGELOG }}
          draft: false
          prerelease: ${{ contains(env.RELEASE_VERSION, '-') }}
