# This patch injects Google API credentials from a Kubernetes secret into the controller container.
# The secret is optional — the pod will start without it, but agent runs will fail until it is created.
# Set GOOGLE_CLOUD_PROJECT and GOOGLE_CLOUD_LOCATION to use Vertex AI, or GOOGLE_API_KEY for the Gemini API.
# For non-GKE clusters, create a "gcp-sa-key" secret with the service account key JSON file —
# GOOGLE_APPLICATION_CREDENTIALS points to where the volume mount places it.
# On GKE with Workload Identity, this env var is ignored and the key secret is not needed.
- op: add
  path: /spec/template/spec/containers/0/env
  value:
    - name: GOOGLE_API_KEY
      valueFrom:
        secretKeyRef:
          name: google-api-key-secret
          key: GOOGLE_API_KEY
          optional: true
    - name: GOOGLE_CLOUD_PROJECT
      valueFrom:
        secretKeyRef:
          name: google-api-key-secret
          key: GOOGLE_CLOUD_PROJECT
          optional: true
    - name: GOOGLE_CLOUD_LOCATION
      valueFrom:
        secretKeyRef:
          name: google-api-key-secret
          key: GOOGLE_CLOUD_LOCATION
          optional: true
    - name: GOOGLE_APPLICATION_CREDENTIALS
      value: /var/secrets/google/key.json
