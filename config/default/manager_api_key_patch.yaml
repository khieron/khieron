# This patch injects Google API credentials from a Kubernetes secret into the controller container.
# The secret keys are marked optional because the secret conditionally includes either:
#   - GOOGLE_API_KEY (for direct Gemini API access), OR
#   - GOOGLE_CLOUD_PROJECT + GOOGLE_CLOUD_LOCATION (for Vertex AI via service account)
# Helm chart validation ensures exactly one authentication method is provided.
# For non-GKE clusters, create a "google-service-account-key" secret with the service account key JSON file —
# GOOGLE_APPLICATION_CREDENTIALS points to where the volume mount places it.
# On GKE with Workload Identity, this env var is ignored and the key secret is not needed.
- op: add
  path: /spec/template/spec/containers/0/env
  value:
    - name: GOOGLE_API_KEY
      valueFrom:
        secretKeyRef:
          name: google-api-key-secret
          key: GOOGLE_API_KEY
          optional: true
    - name: GOOGLE_CLOUD_PROJECT
      valueFrom:
        secretKeyRef:
          name: google-api-key-secret
          key: GOOGLE_CLOUD_PROJECT
          optional: true
    - name: GOOGLE_CLOUD_LOCATION
      valueFrom:
        secretKeyRef:
          name: google-api-key-secret
          key: GOOGLE_CLOUD_LOCATION
          optional: true
    - name: GOOGLE_APPLICATION_CREDENTIALS
      value: /var/secrets/google/key.json
    - name: OPENAI_API_KEY
      valueFrom:
        secretKeyRef:
          name: openai-api-key-secret
          key: OPENAI_API_KEY
          optional: true
