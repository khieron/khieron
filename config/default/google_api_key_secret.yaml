# Note: When converted to Helm chart via 'make helm-chart', the post-processing
# script (hack/patch-helm-secret.sh) adds:
# - Validation that exactly one of GOOGLE_API_KEY or GOOGLE_CLOUD_PROJECT must be provided (mutually exclusive)
# - GOOGLE_CLOUD_LOCATION is only included when GOOGLE_CLOUD_PROJECT is set (defaults to "global")
apiVersion: v1
kind: Secret
metadata:
  name: google-api-key-secret
type: Opaque
stringData:
  GOOGLE_API_KEY: ""
  GOOGLE_CLOUD_PROJECT: ""
  GOOGLE_CLOUD_LOCATION: global
