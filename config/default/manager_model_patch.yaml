# This patch adds model configuration flags to the controller manager.
- op: add
  path: /spec/template/spec/containers/0/args/-
  value: --model-name=gemini-2.5-flash
- op: add
  path: /spec/template/spec/containers/0/args/-
  value: --model-backend=gemini
- op: add
  path: /spec/template/spec/containers/0/args/-
  value: --openai-base-url=
