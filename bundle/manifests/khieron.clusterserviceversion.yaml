apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  annotations:
    alm-examples: |-
      [
        {
          "apiVersion": "agency.khieron.io/v1alpha1",
          "kind": "Advisory",
          "metadata": {
            "labels": {
              "app.kubernetes.io/managed-by": "kustomize",
              "app.kubernetes.io/name": "khieron"
            },
            "name": "advisory-sample"
          },
          "spec": null
        },
        {
          "apiVersion": "agency.khieron.io/v1alpha1",
          "kind": "Skill",
          "metadata": {
            "labels": {
              "app.kubernetes.io/managed-by": "kustomize",
              "app.kubernetes.io/name": "khieron"
            },
            "name": "skill-sample"
          },
          "spec": null
        }
      ]
    capabilities: Basic Install
    createdAt: "2026-06-24T12:38:54Z"
    operatorframework.io/suggested-namespace: khieron-system
    operators.operatorframework.io/builder: operator-sdk-v1.42.2
    operators.operatorframework.io/project_layout: go.kubebuilder.io/v4
  name: khieron.v0.1.2
  namespace: placeholder
spec:
  apiservicedefinitions: {}
  customresourcedefinitions:
    owned:
    - description: Advisory is the Schema for the advisories API.
      displayName: Advisory
      kind: Advisory
      name: advisories.agency.khieron.io
      version: v1alpha1
    - description: Skill is the Schema for the skills API.
      displayName: Skill
      kind: Skill
      name: skills.agency.khieron.io
      version: v1alpha1
  description: |-
    Khieron (pronounced Kay-ron) brings Kubernetes native operator design, together with a Go native agentic SDK adk-go, to create a lightweight operator that brings together two simple concepts:

    * Skills - for a flexible and dynamic way of creating single minded single task agents and
    * Advisories a Human In the Loop mechanism in a familiar CRD style

    See the Khieron repo for more details.

    The service requires a Secret with a GOOGLE_API_KEY:

    ```
    kubectl -n khieron-system create secret generic google-api-key \
    --from-literal=GOOGLE_API_KEY=<key>
    ```
  displayName: Khieron - the Lightweight Agentic Operator
  icon:
  - base64data: 
    mediatype: image/png
  install:
    spec:
      clusterPermissions:
      - rules:
        - apiGroups:
          - ""
          resources:
          - configmaps
          - namespaces
          verbs:
          - get
          - list
          - watch
        - apiGroups:
          - agency.khieron.io
          resources:
          - advisories
          - skills
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - agency.khieron.io
          resources:
          - advisories/finalizers
          - skills/finalizers
          verbs:
          - update
        - apiGroups:
          - agency.khieron.io
          resources:
          - advisories/status
          - skills/status
          verbs:
          - get
          - patch
          - update
        - apiGroups:
          - authentication.k8s.io
          resources:
          - tokenreviews
          verbs:
          - create
        - apiGroups:
          - authorization.k8s.io
          resources:
          - subjectaccessreviews
          verbs:
          - create
        serviceAccountName: khieron-controller-manager
      deployments:
      - label:
          app.kubernetes.io/managed-by: kustomize
          app.kubernetes.io/name: khieron
          control-plane: controller-manager
        name: khieron-controller-manager
        spec:
          replicas: 1
          selector:
            matchLabels:
              app.kubernetes.io/name: khieron
              control-plane: controller-manager
          strategy: {}
          template:
            metadata:
              annotations:
                kubectl.kubernetes.io/default-container: manager
              labels:
                app.kubernetes.io/name: khieron
                control-plane: controller-manager
            spec:
              containers:
              - args:
                - --metrics-bind-address=:8443
                - --leader-elect
                - --health-probe-bind-address=:8081
                - --agent-instruction-path=/etc/khieron/instruction.txt
                - --model-name=gemini-2.5-flash
                command:
                - /manager
                env:
                - name: GOOGLE_API_KEY
                  valueFrom:
                    secretKeyRef:
                      key: GOOGLE_API_KEY
                      name: khieron-google-api-key-secret
                      optional: true
                - name: GOOGLE_CLOUD_PROJECT
                  valueFrom:
                    secretKeyRef:
                      key: GOOGLE_CLOUD_PROJECT
                      name: khieron-google-api-key-secret
                      optional: true
                - name: GOOGLE_CLOUD_LOCATION
                  valueFrom:
                    secretKeyRef:
                      key: GOOGLE_CLOUD_LOCATION
                      name: khieron-google-api-key-secret
                      optional: true
                - name: GOOGLE_APPLICATION_CREDENTIALS
                  value: /var/secrets/google/key.json
                image: ghcr.io/khieron/khieron:v0.1.2-dirty
                imagePullPolicy: IfNotPresent
                livenessProbe:
                  httpGet:
                    path: /healthz
                    port: 8081
                  initialDelaySeconds: 15
                  periodSeconds: 20
                name: manager
                readinessProbe:
                  httpGet:
                    path: /readyz
                    port: 8081
                  initialDelaySeconds: 5
                  periodSeconds: 10
                resources:
                  limits:
                    cpu: 500m
                    memory: 128Mi
                  requests:
                    cpu: 10m
                    memory: 64Mi
                securityContext:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop:
                    - ALL
                volumeMounts:
                - mountPath: /etc/khieron
                  name: agent-instruction
                  readOnly: true
                - mountPath: /var/secrets/google
                  name: google-service-account-key
                  readOnly: true
              securityContext:
                runAsNonRoot: true
                seccompProfile:
                  type: RuntimeDefault
              serviceAccountName: khieron-controller-manager
              terminationGracePeriodSeconds: 10
              volumes:
              - configMap:
                  name: khieron-agent-instruction
                name: agent-instruction
              - name: google-service-account-key
                secret:
                  optional: true
                  secretName: google-service-account-key
      permissions:
      - rules:
        - apiGroups:
          - ""
          resources:
          - configmaps
          verbs:
          - get
          - list
          - watch
          - create
          - update
          - patch
          - delete
        - apiGroups:
          - coordination.k8s.io
          resources:
          - leases
          verbs:
          - get
          - list
          - watch
          - create
          - update
          - patch
          - delete
        - apiGroups:
          - ""
          resources:
          - events
          verbs:
          - create
          - patch
        serviceAccountName: khieron-controller-manager
    strategy: deployment
  installModes:
  - supported: false
    type: OwnNamespace
  - supported: false
    type: SingleNamespace
  - supported: false
    type: MultiNamespace
  - supported: true
    type: AllNamespaces
  keywords:
  - lightweight
  - agentic
  - operator
  - adk
  - go
  - google
  - skills
  - advisories
  - khieron
  - agency
  - sre
  links:
  - name: Khieron
    url: https://khieron.domain
  maintainers:
  - email: scondon@redhat.com
    name: Sean Condon
  maturity: alpha
  provider:
    name: Khieron
    url: https://github.com/khieron
  version: 0.1.2-dirty
