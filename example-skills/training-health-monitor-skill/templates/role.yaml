apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "skill.name" . }}
  labels:
    {{- include "skill.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - trainer.kubeflow.org
  resources:
  - trainjobs
  verbs:
  - get
  - list
  - delete
