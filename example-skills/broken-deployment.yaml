apiVersion: apps/v1
kind: Deployment
metadata:
  name: broken-deployment
  labels:
    app: broken-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: broken-app
  template:
    metadata:
      labels:
        app: broken-app
    spec:
      containers:
      - name: web-container
        # This tag does not exist, causing the image pull to fail
        image: nginx:this-tag-does-not-exist
        ports:
        - containerPort: 80